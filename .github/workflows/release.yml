name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build extension
        run: npm run build

      - name: Validate release version
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./dist/manifest.json').version")"

          if [ "$tag" != "v$package_version" ]; then
            echo "Tag $tag does not match package version v$package_version"
            exit 1
          fi

          if [ "$manifest_version" != "$package_version" ]; then
            echo "Manifest version $manifest_version does not match package version $package_version"
            exit 1
          fi

          test -f dist/manifest.json
          test -f dist/manager.html
          test -f dist/popup.html

      - name: Package extension
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          artifact="tab-group-v${package_version}.zip"

          cd dist
          zip -r "../${artifact}" .
          cd ..

          unzip -l "${artifact}" | grep -q "manifest.json"
          unzip -l "${artifact}" | grep -q "manager.html"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          artifact="tab-group-v${package_version}.zip"

          gh release create "${GITHUB_REF_NAME}" "${artifact}" \
            --title "Tab Group Manager ${GITHUB_REF_NAME}" \
            --generate-notes
